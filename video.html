<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lora: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--poppins);
            margin: 0;
            padding: 0;
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Navigation — consistent with index.html / photography.html */
        header {
            background: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
        }
        .logo-container img {
            height: 50px;
            margin-right: 15px;
        }
        .logo-container h1 {
            font-family: var(--lora);
            font-size: 1.4rem;
            margin: 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-family: var(--lora);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        nav a:hover {
            color: #555;
        }

        /* Page content */
        .container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 20px;
            flex: 1;
        }

        .page-title {
            text-align: center;
            font-family: var(--lora);
            font-size: 2.5rem;
            margin-bottom: 3rem;
            font-weight: 700;
        }

        /* Video gallery */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .video-item {
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: #1a252f;
            color: #fff;
            font-size: 0.8rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="logo draft.png" alt="Riley Musil Logo">
            <h1>Riley Musil</h1>
        </a>
        <nav>
            <ul>
                <li><a href="video.html">Video</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Video Portfolio</h1>

        <div class="video-list">

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/9wd2dRwnwMc"
                        title="Riley Musil Video 1"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/YqYoziZZlg8"
                        title="Riley Musil Video 2"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/GGQ91WSZXIY"
                        title="Riley Musil Video 3"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/5tpDpPqEXyU"
                        title="Riley Musil Video 4"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/3e0WRKEbBAQ"
                        title="Riley Musil Video 5"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Riley Musil. All Rights Reserved.</p>
    </footer>

</body>
</html>
