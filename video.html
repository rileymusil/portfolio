<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lora: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
            --dark: #1a252f;
            --mid: #2c3e50;
            --accent: #bdc3c7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--poppins);
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-container img { height: 50px; margin-right: 15px; }
        .logo-container h1 { font-family: var(--lora); font-size: 1.4rem; margin: 0; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        nav a {
            text-decoration: none; color: #333; font-family: var(--lora);
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.2s;
        }
        nav a:hover { color: #555; }

        .banner {
            background: var(--mid); color: var(--white); text-align: center;
            padding: 4rem 2rem 3rem; position: relative; overflow: hidden;
        }
        .banner::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
        }
        .banner h2 { font-family: var(--lora); font-size: 3rem; margin: 0 0 0.5rem; font-weight: 700; position: relative; }
        .banner p { font-size: 1.1rem; color: var(--accent); margin: 0; font-style: italic; font-family: var(--lora); position: relative; }

        .categories-wrap {
            max-width: 1100px;
            margin: 3rem auto 5rem;
            padding: 0 20px;
            flex: 1;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(280px, 1fr));
            gap: 2rem;
            justify-content: center;
        }

        .category-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.2);
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        .category-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease, background 0.4s ease;
            pointer-events: none;
        }

        .category-title {
            font-family: var(--lora);
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 3px;
            transform: translateY(20px);
            transition: transform 0.4s ease;
            text-align: center;
            padding: 0 10px;
        }

        .category-card:hover img {
            filter: blur(4px) brightness(0.4);
            transform: scale(1.05);
        }

        .category-card:hover .category-overlay {
            opacity: 1;
            background: rgba(0, 0, 0, 0.5);
        }

        .category-card:hover .category-title {
            transform: translateY(0);
        }

        footer {
            background: var(--dark);
            color: var(--white);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: 1fr;
                max-width: 520px;
                margin: 0 auto;
            }
            .category-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="MarkRM.png" alt="Logo">
            <h1>Riley Musil</h1>
        </a>
        <nav>
            <ul>
                <li><a href="video.html">Video</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="banner">
        <h2>Video Portfolio</h2>
        <p>Select a category to view projects.</p>
    </div>

    <div class="categories-wrap">
        <div class="categories-grid">
            <a href="narrative.html" class="category-card">
                <img src="Narrative.jpg" alt="Narrative">
                <div class="category-overlay">
                    <h3 class="category-title">Narrative</h3>
                </div>
            </a>

            <a href="commercial.html" class="category-card">
                <img src="Commercial.jpg" alt="Commercial">
                <div class="category-overlay">
                    <h3 class="category-title">Commercial</h3>
                </div>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Riley Musil. All Rights Reserved.</p>
    </footer>

</body>
</html>
