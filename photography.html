<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lora: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
            --dark: #1a252f;
            --mid: #2c3e50;
            --accent: #bdc3c7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--poppins);
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        header {
            background: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-container img { height: 50px; margin-right: 15px; }
        .logo-container h1 { font-family: var(--lora); font-size: 1.4rem; margin: 0; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        nav a {
            text-decoration: none; color: #333; font-family: var(--lora);
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.2s;
        }
        nav a:hover { color: #555; }

        /* ── Banner ── */
        .banner {
            background: var(--mid); color: var(--white); text-align: center;
            padding: 4rem 2rem 3rem; position: relative; overflow: hidden;
        }
        .banner::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
        }
        .banner h2 { font-family: var(--lora); font-size: 3rem; margin: 0 0 0.5rem; font-weight: 700; position: relative; }
        .banner p { font-size: 1.1rem; color: var(--accent); margin: 0; font-style: italic; font-family: var(--lora); position: relative; }

        /* ── Gallery ── */
        .gallery-wrap {
            max-width: 1200px;
            margin: 2.5rem auto 5rem;
            padding: 0 20px;
            flex: 1;
        }

        .photo-gallery {
            columns: 3;
            column-gap: 12px;
        }
        @media (max-width: 860px)  { .photo-gallery { columns: 2; } }
        @media (max-width: 480px)  { .photo-gallery { columns: 1; } }

        .photo-item {
            break-inside: avoid;
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            background: #e8ecef;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }
        .photo-item:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            transform: translateY(-3px);
        }
        .photo-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
        }
        .photo-item:hover img { transform: scale(1.03); }

        /* stagger first 20, rest fade in together */
        .photo-item:nth-child(1)  { animation-delay: 0.03s; }
        .photo-item:nth-child(2)  { animation-delay: 0.06s; }
        .photo-item:nth-child(3)  { animation-delay: 0.09s; }
        .photo-item:nth-child(4)  { animation-delay: 0.12s; }
        .photo-item:nth-child(5)  { animation-delay: 0.15s; }
        .photo-item:nth-child(6)  { animation-delay: 0.18s; }
        .photo-item:nth-child(7)  { animation-delay: 0.21s; }
        .photo-item:nth-child(8)  { animation-delay: 0.24s; }
        .photo-item:nth-child(9)  { animation-delay: 0.27s; }
        .photo-item:nth-child(10) { animation-delay: 0.30s; }
        .photo-item:nth-child(11) { animation-delay: 0.33s; }
        .photo-item:nth-child(12) { animation-delay: 0.36s; }
        .photo-item:nth-child(13) { animation-delay: 0.39s; }
        .photo-item:nth-child(14) { animation-delay: 0.42s; }
        .photo-item:nth-child(15) { animation-delay: 0.45s; }
        .photo-item:nth-child(16) { animation-delay: 0.48s; }
        .photo-item:nth-child(17) { animation-delay: 0.51s; }
        .photo-item:nth-child(18) { animation-delay: 0.54s; }
        .photo-item:nth-child(19) { animation-delay: 0.57s; }
        .photo-item:nth-child(20) { animation-delay: 0.60s; }
        .photo-item:nth-child(n+21) { animation-delay: 0.60s; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed; inset: 0; z-index: 9000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: all; }

        .lightbox-backdrop {
            position: absolute; inset: 0;
            background: rgba(26, 37, 47, 0.97);
        }

        .lightbox-inner {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            width: 92vw; max-width: 1000px;
        }

        .lightbox-stage {
            display: flex; align-items: center;
            justify-content: center; gap: 1.2rem; width: 100%;
        }

        .lightbox-img-wrap {
            flex: 1; min-width: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .lightbox-img-wrap img {
            max-width: 100%; max-height: 78vh;
            object-fit: contain; border-radius: 6px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: block;
            transition: opacity 0.18s ease;
        }
        .lightbox-img-wrap img.switching { opacity: 0; }

        .lb-arrow {
            flex-shrink: 0;
            background: var(--white); border: 1.5px solid #ddd;
            width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.2s; color: #333;
        }
        .lb-arrow:hover {
            background: var(--mid); color: #fff;
            border-color: var(--mid);
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }

        .lightbox-footer {
            display: flex; align-items: center; justify-content: center;
            width: 100%; margin-top: 1rem;
        }
        .lb-counter {
            font-size: 0.8rem; color: var(--accent);
            letter-spacing: 1px; font-family: var(--lora); font-style: italic;
        }

        .lb-close {
            position: fixed; top: 1.2rem; right: 1.5rem; z-index: 9100;
            background: var(--white); border: 1.5px solid #ddd;
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: all 0.2s; color: #333;
        }
        .lb-close:hover { background: var(--mid); color: #fff; border-color: var(--mid); }
        .lb-close svg { width: 16px; height: 16px; }

        /* ── Footer ── */
        footer {
            text-align: center; padding: 1.5rem;
            background: var(--dark); color: var(--white); font-size: 0.8rem;
        }
    </style>

    <!-- ── LIGHTBOX ── -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
        <div class="lightbox-backdrop" id="lbBackdrop"></div>

        <div class="lightbox-inner">
            <div class="lightbox-stage">
                <button class="lb-arrow" id="lbPrev" aria-label="Previous">&#10094;</button>
                <div class="lightbox-img-wrap">
                    <img id="lbImg" src="" alt="">
                </div>
                <button class="lb-arrow" id="lbNext" aria-label="Next">&#10095;</button>
            </div>
            <div class="lightbox-footer">
                <span class="lb-counter" id="lbCounter"></span>
            </div>
        </div>

        <button class="lb-close" id="lbClose" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <script>
        const gallery   = document.getElementById('gallery');
        const lightbox  = document.getElementById('lightbox');
        const lbImg     = document.getElementById('lbImg');
        const lbCounter = document.getElementById('lbCounter');

        let images  = [];
        let current = 0;

        function buildImageList() {
            images = Array.from(gallery.querySelectorAll('.photo-item img'))
                         .map(i => ({ src: i.src, alt: i.alt }));
        }

        function openAt(index) {
            buildImageList();
            current = (index + images.length) % images.length;
            lbImg.src = images[current].src;
            lbImg.alt = images[current].alt;
            lbCounter.textContent = `${current + 1} / ${images.length}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function navigate(dir) {
            current = (current + dir + images.length) % images.length;
            lbImg.classList.add('switching');
            setTimeout(() => {
                lbImg.src = images[current].src;
                lbImg.alt = images[current].alt;
                lbImg.classList.remove('switching');
                lbCounter.textContent = `${current + 1} / ${images.length}`;
            }, 180);
        }

        function close() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        gallery.querySelectorAll('.photo-item').forEach((item, i) => {
            item.addEventListener('click', () => openAt(i));
        });

        document.getElementById('lbPrev').addEventListener('click', () => navigate(-1));
        document.getElementById('lbNext').addEventListener('click', () => navigate(1));
        document.getElementById('lbClose').addEventListener('click', close);
        document.getElementById('lbBackdrop').addEventListener('click', close);

        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape')     close();
            if (e.key === 'ArrowLeft')  navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });
    </script>
