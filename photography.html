<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --laraz: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
            --mid: #2c3e50;
            --accent: #bdc3c7;
        }

        .banner {
            background: var(--mid);
            color: #fff;
            text-align: center;
            padding: 4rem 2rem 3rem;
        }
        .banner h2 {
            font-family: var(--laraz);
            font-size: 3rem;
            margin: 0 0 0.5rem;
            font-weight: 700;
        }
        .banner p {
            font-size: 1.1rem;
            color: var(--accent);
            margin: 0;
            font-style: italic;
            font-family: var(--laraz);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeUp 0.6s ease both;
        }

        body { font-family: var(--poppins); margin: 0; background: #fff; color: #333; }

        header {
            background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-container img { height: 50px; margin-right: 15px; }
        .logo-container h1 { font-family: var(--laraz); font-size: 1.4rem; margin: 0; }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #333; font-family: var(--laraz); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        .container { max-width: 1100px; margin: 4rem auto; padding: 0 20px; }
        .page-title { text-align: center; font-family: var(--laraz); font-size: 2.5rem; margin-bottom: 3rem; }

        .category-dropdown { border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .category-header {
            width: 100%; padding: 25px; background: none; border: none; text-align: left;
            font-family: var(--laraz); font-size: 1.6rem; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; transition: background 0.2s;
        }
        .category-header:hover { background: #fcfcfc; }
        .category-header::after { content: '+'; font-weight: 300; font-size: 1.8rem; }
        .category-header.active::after { content: '−'; }

        .category-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; position: relative; }

        .carousel-container { position: relative; display: flex; align-items: center; padding: 20px 0; }
        
        .carousel {
            display: flex; gap: 20px; overflow-x: auto; scroll-behavior: smooth;
            scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .carousel img { flex: 0 0 auto; scroll-snap-align: center; border-radius: 4px; object-fit: cover; background: #f0f0f0; }
        
        /* Alternating Aspect Ratios */
        .carousel img:nth-child(odd) { width: 300px; height: 400px; } /* 3:4 Portrait */
        .carousel img:nth-child(even) { width: 400px; height: 300px; align-self: center; } /* 4:3 Landscape */

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.95); border: 1px solid #ddd;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            z-index: 10; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: #000; color: #fff; border-color: #000; }
        .prev { left: -10px; }
        .next { right: -10px; }

        footer { text-align: center; padding: 4rem; font-size: 0.8rem; opacity: 0.5; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="logo draft.png" alt="Riley Musil Logo">
            <h1>Riley Musil</h1>
        </a>
        <nav>
            <ul>
                <li><a href="video.html">Video</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="banner">
        <h2>Photography Portfolio</h2>
        <p>Event coverage, portraits &amp; behind the scenes.</p>
    </div>

    <div class="container fade-in">
        <h1 class="page-title">Photography Portfolio</h1>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Event Coverage</button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="EventCoverage1.jpg" alt="Img"><img src="EventCoverage2.jpg" alt="Img"><img src="EventCoverage3.jpg" alt="Img"><img src="EventCoverage4.jpg" alt="Img"><img src="EventCoverage5.jpg" alt="Img"><img src="EventCoverage6.jpg" alt="Img"><img src="EventCoverage7.jpg" alt="Img"><img src="EventCoverage8.jpg" alt="Img"><img src="EventCoverage9.jpg" alt="Img"><img src="EventCoverage10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Portrait</button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="Portrait1.jpg" alt="Img"><img src="Portrait2.jpg" alt="Img"><img src="Portrait3.jpg" alt="Img"><img src="Portrait4.jpg" alt="Img"><img src="Portrait5.jpg" alt="Img"><img src="Portrait6.jpg" alt="Img"><img src="Portrait7.jpg" alt="Img"><img src="Portrait8.jpg" alt="Img"><img src="Portrait9.jpg" alt="Img"><img src="Portrait10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Behind the Scenes</button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="BTS1.jpg" alt="Img"><img src="BTS2.jpg" alt="Img"><img src="BTS3.jpg" alt="Img"><img src="BTS4.jpg" alt="Img"><img src="BTS5.jpg" alt="Img"><img src="BTS6.jpg" alt="Img"><img src="BTS7.jpg" alt="Img"><img src="BTS8.jpg" alt="Img"><img src="BTS9.jpg" alt="Img"><img src="BTS10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">More</button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="More1.jpg" alt="Img"><img src="More2.jpg" alt="Img"><img src="More3.jpg" alt="Img"><img src="More4.jpg" alt="Img"><img src="More5.jpg" alt="Img"><img src="More6.jpg" alt="Img"><img src="More7.jpg" alt="Img"><img src="More8.jpg" alt="Img"><img src="More9.jpg" alt="Img"><img src="More10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Riley Musil | Creative Services</p>
    </footer>

    <script>
        function toggleAccordion(btn) {
            btn.classList.toggle("active");
            const content = btn.nextElementSibling;
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
            } else {
                content.style.maxHeight = "550px"; 
            }
        }

        function moveCarousel(btn, direction) {
            const carousel = btn.parentElement.querySelector('.carousel');
            const scrollAmount = 450; 
            carousel.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
