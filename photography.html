<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lora: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
            --dark: #1a252f;
            --mid: #2c3e50;
            --accent: #bdc3c7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: var(--poppins); background: #fff; color: #333; display: flex; flex-direction: column; min-height: 100vh; }

        /* ── Navbar ── */
        header {
            background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-container img { height: 50px; margin-right: 15px; }
        .logo-container h1 { font-family: var(--lora); font-size: 1.4rem; margin: 0; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #333; font-family: var(--lora); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.2s; }
        nav a:hover { color: #555; }

        /* ── Banner ── */
        .banner {
            background: var(--mid); color: var(--white); text-align: center;
            padding: 4rem 2rem 3rem; position: relative; overflow: hidden;
        }
        .banner::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
        }
        .banner h2 { font-family: var(--lora); font-size: 3rem; margin: 0 0 0.5rem; font-weight: 700; position: relative; }
        .banner p { font-size: 1.1rem; color: var(--accent); margin: 0; font-style: italic; font-family: var(--lora); position: relative; }

        /* ── Accordion ── */
        .container { max-width: 1100px; margin: 3rem auto 5rem; padding: 0 20px; flex: 1; }

        .category-dropdown {
            border-bottom: 1px solid #eee;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s ease forwards;
        }
        .category-dropdown:nth-child(1) { animation-delay: 0.1s; }
        .category-dropdown:nth-child(2) { animation-delay: 0.2s; }
        .category-dropdown:nth-child(3) { animation-delay: 0.3s; }
        .category-dropdown:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-header {
            width: 100%; padding: 1.6rem 0.5rem; background: none; border: none; text-align: left;
            font-family: var(--lora); font-size: 1.5rem; font-weight: 700; color: var(--mid);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: color 0.2s;
        }
        .category-header:hover { color: #000; }

        .toggle-icon {
            width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #ccc;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 300; color: #999; flex-shrink: 0;
            transition: all 0.2s;
        }
        .category-header:hover .toggle-icon { border-color: var(--mid); color: var(--mid); }
        .category-header.active .toggle-icon { background: var(--mid); border-color: var(--mid); color: #fff; }

        .category-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }

        /* ── Carousel ── */
        .carousel-container { position: relative; display: flex; align-items: center; padding: 16px 0 28px; }

        .carousel {
            display: flex; gap: 16px; overflow-x: auto; scroll-behavior: smooth;
            scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none;
            padding: 8px 4px;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .carousel img {
            flex: 0 0 auto; scroll-snap-align: center;
            border-radius: 6px; object-fit: cover; background: #e8ecef;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .carousel img:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        }
        .carousel img:nth-child(odd)  { width: 300px; height: 400px; }
        .carousel img:nth-child(even) { width: 400px; height: 300px; align-self: center; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--white); border: 1.5px solid #ddd;
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
            z-index: 10; font-size: 1rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: all 0.2s; flex-shrink: 0;
        }
        .nav-btn:hover { background: var(--mid); color: var(--white); border-color: var(--mid); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
        .prev { left: -14px; }
        .next { right: -14px; }

        /* ── Footer ── */
        footer { text-align: center; padding: 1.5rem; background: var(--dark); color: var(--white); font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="MarkRM.png" alt="Riley Musil Logo">
            <h1>Riley Musil</h1>
        </a>
        <nav>
            <ul>
                <li><a href="video.html">Video</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="banner">
        <h2>Photography Portfolio</h2>
        <p>Event coverage, portraits &amp; behind the scenes.</p>
    </div>

    <div class="container">

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Event Coverage <span class="toggle-icon">+</span></button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="EventCoverage1.jpg" alt="Img"><img src="EventCoverage2.jpg" alt="Img"><img src="EventCoverage3.jpg" alt="Img"><img src="EventCoverage4.jpg" alt="Img"><img src="EventCoverage5.jpg" alt="Img"><img src="EventCoverage6.jpg" alt="Img"><img src="EventCoverage7.jpg" alt="Img"><img src="EventCoverage8.jpg" alt="Img"><img src="EventCoverage9.jpg" alt="Img"><img src="EventCoverage10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Portrait <span class="toggle-icon">+</span></button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="Portrait1.jpg" alt="Img"><img src="Portrait2.jpg" alt="Img"><img src="Portrait3.jpg" alt="Img"><img src="Portrait4.jpg" alt="Img"><img src="Portrait5.jpg" alt="Img"><img src="Portrait6.jpg" alt="Img"><img src="Portrait7.jpg" alt="Img"><img src="Portrait8.jpg" alt="Img"><img src="Portrait9.jpg" alt="Img"><img src="Portrait10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">Behind the Scenes <span class="toggle-icon">+</span></button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="BTS1.jpg" alt="Img"><img src="BTS2.jpg" alt="Img"><img src="BTS3.jpg" alt="Img"><img src="BTS4.jpg" alt="Img"><img src="BTS5.jpg" alt="Img"><img src="BTS6.jpg" alt="Img"><img src="BTS7.jpg" alt="Img"><img src="BTS8.jpg" alt="Img"><img src="BTS9.jpg" alt="Img"><img src="BTS10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div class="category-dropdown">
            <button class="category-header" onclick="toggleAccordion(this)">More <span class="toggle-icon">+</span></button>
            <div class="category-content">
                <div class="carousel-container">
                    <button class="nav-btn prev" onclick="moveCarousel(this, -1)">&#10094;</button>
                    <div class="carousel">
                        <img src="More1.jpg" alt="Img"><img src="More2.jpg" alt="Img"><img src="More3.jpg" alt="Img"><img src="More4.jpg" alt="Img"><img src="More5.jpg" alt="Img"><img src="More6.jpg" alt="Img"><img src="More7.jpg" alt="Img"><img src="More8.jpg" alt="Img"><img src="More9.jpg" alt="Img"><img src="More10.jpg" alt="Img">
                    </div>
                    <button class="nav-btn next" onclick="moveCarousel(this, 1)">&#10095;</button>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Riley Musil. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleAccordion(btn) {
            btn.classList.toggle("active");
            const icon = btn.querySelector('.toggle-icon');
            icon.textContent = btn.classList.contains('active') ? '−' : '+';
            const content = btn.nextElementSibling;
            content.style.maxHeight = content.style.maxHeight ? null : "550px";
        }

        function moveCarousel(btn, direction) {
            const carousel = btn.parentElement.querySelector('.carousel');
            carousel.scrollBy({ left: direction * 450, behavior: 'smooth' });
        }
    </script>
</body>
</html>
