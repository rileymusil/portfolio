<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Photography | Riley Musil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lora: 'Lora', serif;
            --poppins: 'Poppins', sans-serif;
            --dark: #1a252f;
            --mid: #2c3e50;
            --accent: #bdc3c7;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--poppins);
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        header {
            background: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: #333; }
        .logo-container img { height: 50px; margin-right: 15px; }
        .logo-container h1 { font-family: var(--lora); font-size: 1.4rem; margin: 0; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        nav a {
            text-decoration: none; color: #333; font-family: var(--lora);
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.2s;
        }
        nav a:hover { color: #555; }

        /* ── Banner ── */
        .banner {
            background: var(--mid); color: var(--white); text-align: center;
            padding: 3rem 2rem 2.5rem; position: relative; overflow: hidden;
        }
        .banner::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
        }
        .banner h2 { font-family: var(--lora); font-size: 2.5rem; margin: 0 0 0.5rem; font-weight: 700; position: relative; }
        .banner p { font-size: 1rem; color: var(--accent); margin: 0; font-style: italic; font-family: var(--lora); position: relative; }
        
        .back-link {
            position: relative;
            display: inline-block;
            margin-top: 1rem;
            color: var(--white);
            text-decoration: none;
            font-family: var(--poppins);
            font-size: 0.9rem;
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--white);
            border-radius: 4px;
            transition: background 0.3s, color 0.3s;
        }
        .back-link:hover {
            background: var(--white);
            color: var(--mid);
        }

        /* ── Gallery Container ── */
        .gallery-wrap {
            max-width: 1200px;
            margin: 2.5rem auto 5rem;
            padding: 0 20px;
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .flickr-embed-container {
            width: 100%;
            min-height: 600px;
            background: #f9f9f9;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        /* ── Footer ── */
        footer {
            background: var(--mid);
            color: var(--accent);
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            font-family: var(--lora);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="MarkRM.png" alt="Logo">
            <h1>Riley Musil</h1>
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="banner">
        <h2>Event Photography</h2>
        <p>Documenting moments and experiences.</p>
        <a href="photography.html" class="back-link">← Back to Categories</a>
    </div>

    <div class="gallery-wrap">
        <div class="flickr-embed-container">
            <a data-flickr-embed="true" data-header="true" data-footer="true" href="https://www.flickr.com/photos/204523124@N06/albums/72177720333276723/" title="Event Photography">
                <img src="https://live.staticflickr.com/65535/54316863673_03c9454865_z.jpg" width="100%" height="auto" alt="Event Photography" style="display:block; margin:auto;">
            </a>
            <script async src="//embedr.flickr.com/assets/client-code.js" charset="utf-8"></script>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Riley Musil. All Rights Reserved.</p>
    </footer>

</body>
</html>
